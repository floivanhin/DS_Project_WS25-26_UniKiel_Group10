<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather vs Goals — Bundesliga 2025</title>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
    <style>
      :root {
        --bg: #0b1220;
        --panel: #111827;
        --text: #e5e7eb;
        --muted: #94a3b8;
        --border: rgba(255, 255, 255, 0.08);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
        --radius: 18px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background: linear-gradient(180deg, #0b1220 0%, #111827 100%);
        color: var(--text);
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 28px 18px 36px;
      }

      .hero,
      .panel,
      .card {
        background: rgba(17, 24, 39, 0.9);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 22px;
        margin-bottom: 18px;
      }

      .hero h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1.2;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 18px;
      }

      .card {
        padding: 16px;
      }

      .label {
        color: var(--muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
      }

      .value {
        font-size: 28px;
        font-weight: 700;
        line-height: 1.1;
      }

      .panel {
        padding: 16px;
      }

      .panel h2 {
        margin: 0 0 12px;
        font-size: 20px;
      }

      #chart {
        min-height: 420px;
      }

      .error {
        padding: 14px;
        border-radius: 14px;
        background: rgba(239, 68, 68, 0.12);
        border: 1px solid rgba(239, 68, 68, 0.28);
        color: #fecaca;
      }

      @media (max-width: 640px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .container {
          padding: 16px 12px 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1>
          How do weather conditions during a match influence the total number of
          goals scored?
        </h1>
      </section>

      <section class="grid">
        <div class="card">
          <div class="label">Matches loaded</div>
          <div class="value" id="totalMatches">—</div>
        </div>
        <div class="card">
          <div class="label">Overall average goals</div>
          <div class="value" id="overallAvg">—</div>
        </div>
      </section>

      <section class="panel">
        <h2>Average goals by weather group</h2>
        <div id="chart"></div>
      </section>
    </div>

    <script>
      function classifyWeather(condition) {
        if (typeof condition !== "string") return "Other";
        const c = condition.toLowerCase();
        if (c.includes("snow")) return "Snow";
        if (
          c.includes("rain") ||
          c.includes("drizzle") ||
          c.includes("showers")
        )
          return "Rain";
        if (c.includes("overcast")) return "Cloudy";
        if (c.includes("cloud")) return "Cloudy";
        if (c.includes("clear")) return "Clear";
        return "Other";
      }

      function toNumber(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }

      function mean(arr) {
        if (!arr.length) return 0;
        return arr.reduce((a, b) => a + b, 0) / arr.length;
      }

      function buildGroupedData(matches) {
        const buckets = {};

        for (const match of matches) {
          const weather = classifyWeather(match?.weather?.conditions);
          const totalGoals =
            toNumber(match?.score?.fullTime?.home) +
            toNumber(match?.score?.fullTime?.away);

          if (!buckets[weather]) buckets[weather] = [];
          buckets[weather].push(totalGoals);
        }

        const order = ["Clear", "Cloudy", "Rain", "Snow", "Other"];
        const rows = Object.entries(buckets).map(([weather, goals]) => ({
          weather_group: weather,
          avg_goals: mean(goals),
          matches: goals.length,
          total_goals_sum: goals.reduce((a, b) => a + b, 0),
        }));

        rows.sort((a, b) => {
          const ai = order.indexOf(a.weather_group);
          const bi = order.indexOf(b.weather_group);
          return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
        });

        return rows;
      }

      function renderCards(matches) {
        const allGoals = matches.map(
          (m) =>
            toNumber(m?.score?.fullTime?.home) +
            toNumber(m?.score?.fullTime?.away),
        );

        document.getElementById("totalMatches").textContent = String(
          matches.length,
        );
        document.getElementById("overallAvg").textContent =
          mean(allGoals).toFixed(2);
      }

      function renderChart(rows) {
        const data = [
          {
            type: "bar",
            x: rows.map((r) => r.weather_group),
            y: rows.map((r) => Number(r.avg_goals.toFixed(2))),
            customdata: rows.map((r) => [r.matches, r.total_goals_sum]),
            hovertemplate:
              "<b>%{x}</b><br>" +
              "Average goals: %{y}<br>" +
              "Matches: %{customdata[0]}<br>" +
              "Total goals: %{customdata[1]}<extra></extra>",
          },
        ];

        const layout = {
          paper_bgcolor: "rgba(0,0,0,0)",
          plot_bgcolor: "rgba(0,0,0,0)",
          font: { color: "#e5e7eb", family: "Inter, system-ui, sans-serif" },
          margin: { l: 50, r: 20, t: 10, b: 60 },
          xaxis: {
            title: "Weather group",
            gridcolor: "rgba(255,255,255,.08)",
          },
          yaxis: {
            title: "Average goals",
            gridcolor: "rgba(255,255,255,.08)",
            zerolinecolor: "rgba(255,255,255,.12)",
          },
        };

        Plotly.newPlot("chart", data, layout, {
          responsive: true,
          displaylogo: false,
        });
      }

      async function init() {
        try {
          const response = await fetch("./combined_matches_weather.json");
          if (!response.ok) {
            throw new Error(
              `Failed to load combined_matches_weather.json (${response.status})`,
            );
          }

          const raw = await response.json();
          const matches = Array.isArray(raw.matches) ? raw.matches : [];

          if (!matches.length) {
            throw new Error(
              "The file was loaded, but raw.matches is empty or missing.",
            );
          }

          const grouped = buildGroupedData(matches);
          renderCards(matches);
          renderChart(grouped);
        } catch (error) {
          document.getElementById("chart").innerHTML =
            `<div class="error">${error.message}</div>`;
        }
      }

      init();
    </script>
  </body>
</html>
